midl: 1.0.0
meta:
  title: Engine & Systems
  description: Engine RPM and coolant temperature gauges, fuel level and oil pressure.
  useCase: Motoring or monitoring the engine and tanks.
  agentNotes: Choose when the user asks about the engine, RPM, temperature, fuel or oil.
  tags: [engine, systems, motor, fuel]
screens:
  - id: engine
    meta:
      title: Engine
      useCase: Keep an eye on the engine while motoring.
    elements:
      rpm:
        type: gauge
        name: RPM
        format: { unit: rpm, decimals: 0 }
        style:
          range: [0, 3600]
          zones:
            - { lt: 600, color: warn }
            - { lt: 3000, color: good }
            - { lt: 3601, color: bad }
        bindings:
          value: { kind: signalk, path: propulsion.main.revolutions }
      temp:
        type: gauge
        name: COOLANT
        format: { unit: degC, decimals: 0 }
        style:
          range: [0, 130]
          zones:
            - { lt: 60, color: warn }
            - { lt: 100, color: good }
            - { lt: 130, color: bad }
        bindings:
          value: { kind: signalk, path: propulsion.main.temperature }
      fuel:
        type: bar
        name: FUEL
        format: { unit: "%", decimals: 0 }
        style:
          range: [0, 100]
          zones:
            - { lt: 20, color: bad }
            - { lt: 40, color: warn }
            - { lt: 101, color: good }
        bindings:
          value: { kind: signalk, path: tanks.fuel.0.currentLevel }
      oil:
        type: single-value
        name: OIL
        format: { unit: bar, decimals: 1 }
        bindings:
          value: { kind: signalk, path: propulsion.main.oilPressure }
    layout:
      rows: 2
      cols: 2
      cells:
        - element: rpm
        - element: temp
        - element: fuel
        - element: oil
    variants:
      - class: square-480
        layout:
          rows: 2
          cols: 2
          cells:
            - element: rpm
            - element: temp
            - element: fuel
            - element: oil
